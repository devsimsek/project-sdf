name: CI

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [dev]

jobs:
  phpunit:
    name: PHPUnit (${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: pdo, pdo_sqlite, sqlite3, mbstring, json, redis
          ini-values: error_reporting=E_ALL
      - name: Validate composer.json
        run: composer validate --strict
      - name: Cache Composer deps
        uses: actions/cache@v4
        with:
          path: vendor/
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.json') }}
      - name: Install deps
        run: composer install --no-interaction --no-progress
      - name: PHPUnit
        run: vendor/bin/phpunit --no-coverage

  phpstan:
    name: PHPStan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo, pdo_sqlite, sqlite3, mbstring, json
      - name: Install deps
        run: composer install --no-interaction --no-progress
      - name: PHPStan
        run: composer analyze

  cs-fixer:
    name: PHP-CS-Fixer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: cs2pr
      - name: Install deps
        run: composer install --no-interaction --no-progress
      - name: CS check
        run: composer cs:check
